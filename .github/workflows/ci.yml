name: ScholarStack CI Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Base
      uses: actions/checkout@v4

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Install Project Dependencies
      run: pip install pydantic google-genai

    - name: Run Static Code Analysis (Syntax Check)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Validate Pydantic Schema and Module Imports
      run: |
        python3 - <<'EOF'
        import json
        from src.schema import LectureEvaluation

        # Validate the schema can parse a real evaluation result
        sample = {
            "factual_consistency_score": 0.95,
            "summary_quality_score": 0.98,
            "hallucination_detected": True,
            "hallucinated_claims": ["ungrounded_claim_a"],
            "missing_critical_terms": ["term_a", "term_b"],
            "key_concepts_covered": ["concept_a", "concept_b"]
        }
        result = LectureEvaluation(**sample)
        assert result.factual_consistency_score == 0.95
        assert result.hallucination_detected is True
        assert len(result.hallucinated_claims) == 1
        assert len(result.key_concepts_covered) == 2
        print("[CI] LectureEvaluation schema validation passed.")

        # Validate sample output artifact is valid JSON matching schema
        with open("sample_output/evaluation.json") as f:
            live = LectureEvaluation(**json.load(f))
        assert 0.0 <= live.factual_consistency_score <= 1.0
        assert 0.0 <= live.summary_quality_score <= 1.0
        print("[CI] Live evaluation.json artifact validated against schema.")
        EOF
